<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>릴스 감독</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --yellow: #ffd166;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100vh; }
  .screen.active { display: flex; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    justify-content: center;
    align-items: center;
    padding: 2rem;
    gap: 2rem;
    background: var(--bg);
  }

  .logo-area { text-align: center; }
  .logo-icon {
    width: 72px; height: 72px;
    background: var(--accent);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 1rem;
    box-shadow: 0 0 40px rgba(255,107,53,0.4);
  }
  .logo-title {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .intro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    width: 100%;
  }
  .intro-card h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: var(--text); }
  .intro-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag {
    font-size: 12px; padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.accent { background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.3); color: var(--accent); }

  .scene-preview { display: flex; flex-direction: column; gap: 8px; }
  .scene-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
  }
  .scene-num {
    width: 22px; height: 22px;
    background: var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    color: var(--muted);
  }

  .btn-start {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-start:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(255,107,53,0.3); }

  /* ── GUIDE SCREEN ── */
  #screen-guide { background: var(--bg); }

  .guide-header {
    padding: 1rem 1.25rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .guide-header .back-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
  }
  .scene-counter {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }
  .scene-counter span { color: var(--accent); font-weight: 700; }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .guide-content {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .scene-title-area { }
  .scene-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .scene-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .info-chip .chip-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .info-chip .chip-val { font-size: 13px; font-weight: 500; }

  .script-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 1rem;
  }
  .script-box .script-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .script-box .script-text { font-size: 15px; line-height: 1.6; }

  .tip-box {
    background: rgba(255,209,102,0.08);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--yellow);
    display: flex; gap: 8px; align-items: flex-start;
  }

  /* ── CAMERA AREA ── */
  .camera-section {
    flex-shrink: 0;
    padding: 0 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .camera-box {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    max-height: 240px;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  #cameraFeed {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  #cameraFeed.active { display: block; }

  .camera-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--muted);
    font-size: 13px;
  }
  .camera-placeholder .cam-icon { font-size: 36px; opacity: 0.4; }

  .rec-indicator {
    position: absolute;
    top: 10px; left: 10px;
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    display: none;
  }
  .rec-indicator.active { display: flex; }
  .rec-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .timer-display {
    position: absolute;
    bottom: 10px; right: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 4px 8px;
    border-radius: 8px;
    display: none;
  }
  .timer-display.active { display: block; }

  .camera-btns {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .btn-cam-open {
    flex: 1;
    padding: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cam-open:active { background: var(--surface2); }

  .btn-record {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid white;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .btn-record:active { transform: scale(0.95); }
  .record-inner {
    width: 44px; height: 44px;
    background: var(--red);
    border-radius: 50%;
    transition: border-radius 0.2s, width 0.2s, height 0.2s;
  }
  .btn-record.recording .record-inner {
    border-radius: 8px;
    width: 28px; height: 28px;
    background: var(--red);
  }

  /* ── REVIEW SCREEN ── */
  #screen-review {
    background: var(--bg);
    justify-content: flex-end;
  }

  .review-video-area {
    flex: 1;
    background: #000;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #reviewVideo {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .review-scene-tag {
    position: absolute;
    top: 16px; left: 16px;
    background: rgba(0,0,0,0.7);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }

  .review-actions {
    padding: 1.25rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .review-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .review-sub { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  .review-btns { display: flex; gap: 8px; }
  .btn-review {
    flex: 1; padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-review:active { transform: scale(0.97); }
  .btn-ng { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-keep { background: rgba(255,209,102,0.2); color: var(--yellow); border: 1px solid rgba(255,209,102,0.3); }
  .btn-ok { background: var(--green); color: #000; }

  /* ── COMPLETE SCREEN ── */
  #screen-complete {
    justify-content: center;
    align-items: center;
    padding: 2rem;
    gap: 1.5rem;
    text-align: center;
  }
  .complete-icon {
    width: 80px; height: 80px;
    background: rgba(6,214,160,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border: 2px solid rgba(6,214,160,0.3);
  }
  .complete-title { font-size: 24px; font-weight: 700; }
  .complete-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .scene-results {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .result-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
  }
  .result-status {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .status-ok { background: rgba(6,214,160,0.2); }
  .status-keep { background: rgba(255,209,102,0.2); }
  .status-none { background: var(--border); }

  .btn-export {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  .btn-restart {
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="logo-area">
      <div class="logo-icon">🎬</div>
      <div class="logo-title">릴스 감독</div>
      <div class="logo-sub">대본대로 찍기만 하면 완성</div>
    </div>

    <div class="intro-card">
      <h3>오늘의 촬영 대본</h3>
      <div class="intro-meta">
        <span class="tag accent">카페</span>
        <span class="tag">릴스</span>
        <span class="tag">5씬</span>
        <span class="tag">약 30초</span>
      </div>
      <div class="scene-preview" id="sceneList"></div>
    </div>

    <button class="btn-start" onclick="startGuide()">촬영 시작하기 →</button>
  </div>

  <!-- GUIDE -->
  <div id="screen-guide" class="screen">
    <div class="guide-header">
      <div class="back-btn" onclick="goIntro()">←</div>
      <div class="scene-counter">씬 <span id="sceneNum">1</span> / 5</div>
      <div style="width:36px"></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:20%"></div>
    </div>

    <div class="guide-content" id="guideContent"></div>

    <div class="camera-section">
      <div class="camera-box">
        <video id="cameraFeed" autoplay muted playsinline></video>
        <div class="camera-placeholder" id="camPlaceholder">
          <div class="cam-icon">📷</div>
          <div>카메라를 켜서 촬영하세요</div>
        </div>
        <div class="rec-indicator" id="recIndicator">
          <div class="rec-dot"></div>
          REC
        </div>
        <div class="timer-display" id="timerDisplay">0:00</div>
      </div>

      <div class="camera-btns">
        <button class="btn-cam-open" id="camBtn" onclick="toggleCamera()">📷 카메라 켜기</button>
        <button class="btn-record" id="recordBtn" onclick="toggleRecord()">
          <div class="record-inner"></div>
        </button>
        <button class="btn-cam-open" onclick="skipScene()" style="color:var(--muted)">건너뛰기</button>
      </div>
    </div>
  </div>

  <!-- REVIEW -->
  <div id="screen-review" class="screen">
    <div class="review-video-area">
      <video id="reviewVideo" controls playsinline></video>
      <div class="review-scene-tag" id="reviewSceneTag">씬 1</div>
    </div>
    <div class="review-actions">
      <div class="review-title" id="reviewTitle"></div>
      <div class="review-sub">이 클립을 어떻게 할까요?</div>
      <div class="review-btns">
        <button class="btn-review btn-ng" onclick="reviewAction('ng')">❌ NG</button>
        <button class="btn-review btn-keep" onclick="reviewAction('keep')">📌 킵</button>
        <button class="btn-review btn-ok" onclick="reviewAction('ok')">✅ OK</button>
      </div>
    </div>
  </div>

  <!-- COMPLETE -->
  <div id="screen-complete" class="screen">
    <div class="complete-icon">🎉</div>
    <div>
      <div class="complete-title">촬영 완료!</div>
      <div class="complete-sub" style="margin-top:8px">모든 씬 촬영이 끝났어요.<br>클립을 이어붙여 릴스를 완성하세요.</div>
    </div>
    <div class="scene-results" id="sceneResults"></div>
    <div style="width:100%;display:flex;flex-direction:column;gap:8px">
      <button class="btn-export" onclick="alert('편집 & 자막 자동 생성 기능은 다음 버전에서 출시됩니다! 🚀')">릴스 완성하기 →</button>
      <button class="btn-restart" onclick="restart()">처음부터 다시</button>
    </div>
  </div>

</div>

<script>
const SCENES = [
  {
    title: "카페 외관 & 분위기 샷",
    angle: "가게 앞 / 세로",
    duration: "3~5초",
    script: "\"부산 수영구 숨은 카페 발견 ☕\"",
    tip: "입구나 간판이 잘 보이게. 자연광이 있으면 더 좋아요.",
    icon: "🏠"
  },
  {
    title: "시그니처 메뉴 클로즈업",
    angle: "위에서 / 클로즈업",
    duration: "3~4초",
    script: "\"이게 요즘 우리 카페 베스트예요\"",
    tip: "음료가 돋보이게. 손으로 들고 찍으면 생동감 있어요.",
    icon: "☕"
  },
  {
    title: "사장님 직접 만드는 장면",
    angle: "카운터 옆 / 측면",
    duration: "4~6초",
    script: "\"저는 매일 아침 직접 내려요. 한 잔 한 잔 정성껏.\"",
    tip: "자연스럽게 일하는 모습을. 카메라 의식하지 말고요.",
    icon: "👨‍🍳"
  },
  {
    title: "카페 내부 인테리어",
    angle: "안쪽에서 / 천천히 패닝",
    duration: "3~5초",
    script: "\"분위기 맛집이라는 말, 직접 보면 알아요\"",
    tip: "카메라를 천천히 옆으로 움직이며 찍어보세요.",
    icon: "🪴"
  },
  {
    title: "마무리 CTA",
    angle: "정면 / 미디엄샷",
    duration: "3~4초",
    script: "\"부산 수영구 오시면 꼭 들러보세요. 위치는 프로필에!\"",
    tip: "카메라 똑바로 보고 자신있게. 짧고 강하게 끝내세요.",
    icon: "📍"
  }
];

let currentScene = 0;
let stream = null;
let mediaRecorder = null;
let recordedChunks = [];
let timerInterval = null;
let elapsedSeconds = 0;
let isCameraOn = false;
let isRecording = false;
let sceneStatuses = Array(5).fill('none');
let sceneBlobs = Array(5).fill(null);

// Init scene list
function initSceneList() {
  const el = document.getElementById('sceneList');
  el.innerHTML = SCENES.map((s, i) => `
    <div class="scene-item">
      <div class="scene-num">${i+1}</div>
      <div>${s.icon} ${s.title}</div>
    </div>
  `).join('');
}

function startGuide() {
  currentScene = 0;
  showScreen('screen-guide');
  renderGuide();
}

function goIntro() {
  stopAll();
  showScreen('screen-intro');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderGuide() {
  const s = SCENES[currentScene];
  document.getElementById('sceneNum').textContent = currentScene + 1;
  document.getElementById('progressFill').style.width = ((currentScene + 1) / 5 * 100) + '%';

  document.getElementById('guideContent').innerHTML = `
    <div class="scene-title-area">
      <div class="scene-label">SCENE ${currentScene + 1} OF 5</div>
      <div class="scene-title">${s.icon} ${s.title}</div>
    </div>
    <div class="info-grid">
      <div class="info-chip">
        <div class="chip-label">📐 각도 & 위치</div>
        <div class="chip-val">${s.angle}</div>
      </div>
      <div class="info-chip">
        <div class="chip-label">⏱ 목표 길이</div>
        <div class="chip-val">${s.duration}</div>
      </div>
    </div>
    <div class="script-box">
      <div class="script-label">🎙 자막 / 대사</div>
      <div class="script-text">${s.script}</div>
    </div>
    <div class="tip-box">
      💡 ${s.tip}
    </div>
  `;

  // reset camera UI
  resetCameraUI();
}

function resetCameraUI() {
  document.getElementById('recIndicator').classList.remove('active');
  document.getElementById('timerDisplay').classList.remove('active');
  document.getElementById('recordBtn').classList.remove('recording');
  isRecording = false;
  clearInterval(timerInterval);
}

async function toggleCamera() {
  if (isCameraOn) {
    stopAll();
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1080 }, height: { ideal: 1920 } },
      audio: true
    });
    const feed = document.getElementById('cameraFeed');
    feed.srcObject = stream;
    feed.classList.add('active');
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camBtn').textContent = '📷 카메라 끄기';
    isCameraOn = true;
  } catch(e) {
    alert('카메라 접근 권한이 필요해요. 브라우저 설정에서 허용해주세요.');
  }
}

function toggleRecord() {
  if (!isCameraOn) {
    alert('먼저 카메라를 켜주세요!');
    return;
  }
  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
}

function startRecording() {
  recordedChunks = [];
  const options = { mimeType: 'video/webm;codecs=vp9,opus' };
  try {
    mediaRecorder = new MediaRecorder(stream, options);
  } catch(e) {
    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    sceneBlobs[currentScene] = blob;
    showReview(blob);
  };

  mediaRecorder.start();
  isRecording = true;

  document.getElementById('recIndicator').classList.add('active');
  document.getElementById('timerDisplay').classList.add('active');
  document.getElementById('recordBtn').classList.add('recording');

  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const m = Math.floor(elapsedSeconds / 60);
    const s = elapsedSeconds % 60;
    document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  clearInterval(timerInterval);
  resetCameraUI();
}

function showReview(blob) {
  const url = URL.createObjectURL(blob);
  const video = document.getElementById('reviewVideo');
  video.src = url;
  document.getElementById('reviewSceneTag').textContent = `씬 ${currentScene + 1}`;
  document.getElementById('reviewTitle').textContent = SCENES[currentScene].title;
  showScreen('screen-review');
  video.play();
}

function reviewAction(action) {
  sceneStatuses[currentScene] = action;
  stopAll();
  nextScene();
}

function skipScene() {
  sceneStatuses[currentScene] = 'none';
  stopAll();
  nextScene();
}

function nextScene() {
  if (currentScene < 4) {
    currentScene++;
    showScreen('screen-guide');
    renderGuide();
  } else {
    showComplete();
  }
}

function showComplete() {
  const statusMap = { ok: '✅', keep: '📌', none: '—', ng: '❌' };
  const colorMap = { ok: 'status-ok', keep: 'status-keep', none: 'status-none', ng: 'status-none' };

  document.getElementById('sceneResults').innerHTML = SCENES.map((s, i) => `
    <div class="result-item">
      <div class="result-status ${colorMap[sceneStatuses[i]]}">${statusMap[sceneStatuses[i]]}</div>
      <div>${s.icon} ${s.title}</div>
    </div>
  `).join('');

  showScreen('screen-complete');
}

function stopAll() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  clearInterval(timerInterval);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  const feed = document.getElementById('cameraFeed');
  feed.srcObject = null;
  feed.classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camBtn').textContent = '📷 카메라 켜기';
  isCameraOn = false;
  isRecording = false;
  resetCameraUI();
}

function restart() {
  sceneStatuses = Array(5).fill('none');
  sceneBlobs = Array(5).fill(null);
  currentScene = 0;
  showScreen('screen-intro');
}

initSceneList();
</script>
</body>
</html>
