<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>릴스 감독</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --bg:#0a0a0a; --surface:rgba(20,20,20,0.92); --border:rgba(255,255,255,0.1); --text:#f0f0f0; --muted:#888; --accent:#ff6b35; --green:#06d6a0; --red:#ef476f; --yellow:#ffd166; }
  html,body { height:100%; width:100%; background:#000; color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow:hidden; }
  .app { height:100vh; width:100%; position:relative; max-width:430px; margin:0 auto; }
  .screen { display:none; width:100%; height:100vh; position:absolute; top:0; left:0; }
  .screen.active { display:flex; flex-direction:column; }

  /* INTRO */
  #screen-intro { background:var(--bg); overflow-y:auto; }
  .intro-scroll { min-height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:2rem; gap:1.25rem; }
  .logo-area { text-align:center; }
  .logo-icon { width:60px; height:60px; background:var(--accent); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 0.75rem; box-shadow:0 0 30px rgba(255,107,53,0.4); }
  .logo-title { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
  .logo-sub { font-size:13px; color:var(--muted); margin-top:4px; }
  .intro-card { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:20px; padding:1.25rem; width:100%; }
  .intro-card h3 { font-size:14px; font-weight:500; margin-bottom:0.75rem; }
  .intro-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:0.75rem; }
  .tag { font-size:12px; padding:4px 10px; border-radius:20px; background:rgba(255,255,255,0.07); border:1px solid var(--border); color:var(--muted); }
  .tag.accent { background:rgba(255,107,53,0.15); border-color:rgba(255,107,53,0.3); color:var(--accent); }
  .scene-preview { display:flex; flex-direction:column; gap:6px; }
  .scene-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:rgba(255,255,255,0.04); border-radius:10px; font-size:13px; }
  .scene-num { width:22px; height:22px; background:rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family:'Space Mono',monospace; flex-shrink:0; color:var(--muted); }
  .btn-start { width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:14px; font-size:16px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; box-shadow:0 4px 20px rgba(255,107,53,0.4); flex-shrink:0; }

  /* GUIDE */
  #screen-guide { background:#000; position:relative; }
  #cameraFeed { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }
  .cam-placeholder-full { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .cam-placeholder-full .ph-icon { font-size:48px; opacity:0.3; }
  .cam-placeholder-full .ph-text { font-size:14px; }
  .cam-placeholder-full .btn-cam-on { margin-top:8px; padding:12px 24px; background:var(--accent); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .cam-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; display:flex; flex-direction:column; pointer-events:none; }
  .overlay-top { padding:1rem 1.25rem; background:linear-gradient(to bottom,rgba(0,0,0,0.75) 0%,transparent 100%); display:flex; align-items:center; justify-content:space-between; pointer-events:all; }
  .back-btn { width:36px; height:36px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:white; }
  .scene-counter { font-family:'Space Mono',monospace; font-size:13px; color:rgba(255,255,255,0.8); background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:20px; }
  .scene-counter span { color:var(--accent); font-weight:700; }
  .rec-indicator { display:none; align-items:center; gap:6px; background:rgba(0,0,0,0.6); border-radius:20px; padding:6px 12px; font-size:12px; font-family:'Space Mono',monospace; color:white; }
  .rec-indicator.active { display:flex; }
  .rec-dot { width:8px; height:8px; background:var(--red); border-radius:50%; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .overlay-scene-info { padding:0 1.25rem; margin-top:8px; }
  .scene-info-card { background:rgba(0,0,0,0.55); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:12px 14px; }
  .scene-info-title { font-size:15px; font-weight:700; margin-bottom:6px; }
  .scene-info-row { display:flex; gap:12px; font-size:12px; color:rgba(255,255,255,0.6); }
  .scene-info-row span { color:rgba(255,255,255,0.9); }
  .overlay-middle { flex:1; display:flex; align-items:center; justify-content:center; }
  .action-anim { font-family:'Space Mono',monospace; font-size:56px; font-weight:700; color:white; text-shadow:0 0 30px rgba(255,107,53,0.8); opacity:0; transform:scale(0.5); transition:opacity 0.15s,transform 0.15s; text-align:center; letter-spacing:-2px; }
  .action-anim.show { opacity:1; transform:scale(1); }
  .action-anim.c-accent { color:var(--accent); text-shadow:0 0 30px rgba(255,107,53,0.9); }
  .action-anim.c-green { color:var(--green); text-shadow:0 0 30px rgba(6,214,160,0.9); }
  .teleprompter { position:fixed; bottom:160px; left:50%; transform:translateX(-50%); width:100%; max-width:430px; padding:0 1.25rem; display:none; z-index:20; pointer-events:none; }
  .teleprompter.active { display:block; }
  .teleprompter-inner { background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); border-left:3px solid var(--accent); border-radius:12px; padding:12px 14px; }
  .tp-label { font-size:11px; color:var(--accent); font-family:'Space Mono',monospace; margin-bottom:6px; letter-spacing:0.05em; }
  .tp-text { font-size:16px; line-height:1.6; font-weight:500; color:white; }
  .overlay-tip { position:fixed; bottom:160px; left:50%; transform:translateX(-50%); width:100%; max-width:430px; padding:0 1.25rem; display:none; z-index:20; pointer-events:none; }
  .overlay-tip.active { display:block; }
  .tip-inner { background:rgba(255,209,102,0.12); border:1px solid rgba(255,209,102,0.25); border-radius:10px; padding:10px 14px; font-size:13px; color:var(--yellow); }
  .overlay-bottom { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; padding:0.75rem 1.25rem max(1.25rem, env(safe-area-inset-bottom)); background:linear-gradient(to top,rgba(0,0,0,0.92) 60%,transparent 100%); pointer-events:all; z-index:15; }
  .progress-dots { display:flex; justify-content:center; gap:6px; margin-bottom:0.75rem; }
  .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.25); transition:background 0.3s,width 0.3s; }
  .dot.active { background:var(--accent); width:18px; border-radius:3px; }
  .dot.done { background:var(--green); }
  .controls-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .btn-side { width:52px; height:52px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:white; flex-shrink:0; }
  .btn-side:active { background:rgba(255,255,255,0.2); }
  .btn-record { width:72px; height:72px; border-radius:50%; border:4px solid white; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform 0.1s; }
  .btn-record:active { transform:scale(0.95); }
  .record-inner { width:52px; height:52px; background:var(--red); border-radius:50%; transition:border-radius 0.25s,width 0.25s,height 0.25s; }
  .btn-record.recording .record-inner { border-radius:10px; width:30px; height:30px; }
  .btn-record.disabled { opacity:0.4; pointer-events:none; }
  .timer-badge { position:fixed; bottom:155px; right:calc(50% - 200px); z-index:20; font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:white; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:20px; display:none; }

  /* REVIEW */
  #screen-review { background:#000; }
  .review-video-area { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #reviewVideo { width:100%; height:100%; object-fit:contain; }
  .review-scene-tag { position:absolute; top:16px; left:16px; background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 14px; font-size:13px; font-family:'Space Mono',monospace; }
  .review-actions { padding:1.25rem; background:rgba(14,14,14,0.98); border-top:1px solid rgba(255,255,255,0.08); }
  .review-title { font-size:16px; font-weight:700; margin-bottom:4px; }
  .review-sub { font-size:13px; color:var(--muted); margin-bottom:12px; }
  .review-btns { display:flex; gap:8px; }
  .btn-review { flex:1; padding:14px; border-radius:12px; border:none; font-size:14px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .btn-ng { background:rgba(255,255,255,0.08); color:var(--text); border:1px solid rgba(255,255,255,0.12); }
  .btn-keep { background:rgba(255,209,102,0.15); color:var(--yellow); border:1px solid rgba(255,209,102,0.3); }
  .btn-ok { background:var(--green); color:#000; }

  /* COMPLETE */
  #screen-complete { background:var(--bg); justify-content:center; align-items:center; padding:2rem; gap:1.5rem; text-align:center; }
  .complete-icon { width:80px; height:80px; background:rgba(6,214,160,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; border:2px solid rgba(6,214,160,0.3); }
  .complete-title { font-size:24px; font-weight:700; }
  .complete-sub { font-size:14px; color:var(--muted); line-height:1.6; margin-top:6px; }
  .scene-results { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:16px; padding:1rem; display:flex; flex-direction:column; gap:8px; }
  .result-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:rgba(255,255,255,0.03); border-radius:10px; font-size:13px; }
  .result-status { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .s-ok { background:rgba(6,214,160,0.2); }
  .s-keep { background:rgba(255,209,102,0.2); }
  .s-none { background:rgba(255,255,255,0.05); }
  .btn-export { width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:14px; font-size:16px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; box-shadow:0 4px 20px rgba(255,107,53,0.4); }
  .btn-restart { width:100%; padding:13px; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:14px; font-size:14px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; margin-top:4px; }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="intro-scroll">
      <div class="logo-area">
        <div class="logo-icon">🎬</div>
        <div class="logo-title">릴스 감독</div>
        <div class="logo-sub">대본대로 찍기만 하면 완성</div>
      </div>
      <div class="intro-card">
        <h3>오늘의 촬영 대본</h3>
        <div class="intro-meta">
          <span class="tag accent">카페</span><span class="tag">릴스</span><span class="tag">5씬</span><span class="tag">약 30초</span>
        </div>
        <div class="scene-preview" id="sceneList"></div>
      </div>
      <button class="btn-start" onclick="startGuide()">촬영 시작하기 →</button>
    </div>
  </div>

  <!-- GUIDE -->
  <div id="screen-guide" class="screen">
    <video id="cameraFeed" autoplay muted playsinline></video>
    <div class="cam-placeholder-full" id="camPlaceholder">
      <div class="ph-icon">📷</div>
      <div class="ph-text">카메라를 켜서 촬영을 시작하세요</div>
      <button class="btn-cam-on" onclick="openCamera()">카메라 켜기</button>
    </div>
    <div class="cam-overlay">
      <div class="overlay-top">
        <div class="back-btn" onclick="goIntro()">←</div>
        <div class="scene-counter">씬 <span id="sceneNum">1</span> / 5</div>
        <div class="rec-indicator" id="recIndicator"><div class="rec-dot"></div> REC</div>
      </div>
      <div class="overlay-scene-info">
        <div class="scene-info-card">
          <div class="scene-info-title" id="infoTitle"></div>
          <div class="scene-info-row"><div>📐 <span id="infoAngle"></span></div><div>⏱ <span id="infoDuration"></span></div></div>
        </div>
      </div>
      <div class="overlay-middle">
        <div class="action-anim" id="actionAnim"></div>
      </div>
      <div class="overlay-bottom">
        <div class="progress-dots" id="progressDots"></div>
        <div class="controls-row">
          <div class="btn-side" onclick="skipScene()">⏭</div>
          <button class="btn-record" id="recordBtn" onclick="handleRecordBtn()"><div class="record-inner"></div></button>
          <div class="btn-side" onclick="flipCamera()">🔄</div>
        </div>
      </div>
    </div>
    <div class="teleprompter" id="teleprompter">
      <div class="teleprompter-inner">
        <div class="tp-label">🎙 대사</div>
        <div class="tp-text" id="teleprompterText"></div>
      </div>
    </div>
    <div class="overlay-tip" id="overlayTip">
      <div class="tip-inner" id="tipText"></div>
    </div>
    <div class="timer-badge" id="timerBadge">0:00</div>
  </div>

  <!-- REVIEW -->
  <div id="screen-review" class="screen">
    <div class="review-video-area">
      <video id="reviewVideo" controls playsinline></video>
      <div class="review-scene-tag" id="reviewSceneTag">씬 1</div>
    </div>
    <div class="review-actions">
      <div class="review-title" id="reviewTitle"></div>
      <div class="review-sub">이 클립을 어떻게 할까요?</div>
      <div class="review-btns">
        <button class="btn-review btn-ng" onclick="reviewAction('ng')">❌ NG</button>
        <button class="btn-review btn-keep" onclick="reviewAction('keep')">📌 킵</button>
        <button class="btn-review btn-ok" onclick="reviewAction('ok')">✅ OK</button>
      </div>
    </div>
  </div>

  <!-- COMPLETE -->
  <div id="screen-complete" class="screen">
    <div class="complete-icon">🎉</div>
    <div><div class="complete-title">촬영 완료!</div><div class="complete-sub">모든 씬 촬영이 끝났어요.<br>클립을 이어붙여 릴스를 완성하세요.</div></div>
    <div class="scene-results" id="sceneResults"></div>
    <div style="width:100%;display:flex;flex-direction:column;gap:8px">
      <button class="btn-export" onclick="alert('편집 & 자막 자동 생성 기능은 다음 버전에서 출시됩니다! 🚀')">릴스 완성하기 →</button>
      <button class="btn-restart" onclick="restart()">처음부터 다시</button>
    </div>
  </div>

</div>
<script>
const SCENES=[
  {title:"카페 외관 & 분위기 샷",angle:"가게 앞 / 세로",duration:"3~5초",script:"부산 수영구 숨은 카페 발견",tip:"💡 입구나 간판이 잘 보이게. 자연광 있으면 더 좋아요.",icon:"🏠"},
  {title:"시그니처 메뉴 클로즈업",angle:"위에서 / 클로즈업",duration:"3~4초",script:"이게 요즘 우리 카페 베스트예요",tip:"💡 음료가 돋보이게. 손으로 들고 찍으면 생동감 있어요.",icon:"☕"},
  {title:"사장님 직접 만드는 장면",angle:"카운터 옆 / 측면",duration:"4~6초",script:"저는 매일 아침 직접 내려요 한 잔 한 잔 정성껏",tip:"💡 자연스럽게 일하는 모습을. 카메라 의식하지 말고요.",icon:"👨‍🍳"},
  {title:"카페 내부 인테리어",angle:"안쪽에서 / 천천히 패닝",duration:"3~5초",script:"분위기 맛집이라는 말 직접 보면 알아요",tip:"💡 카메라를 천천히 옆으로 움직이며 찍어보세요.",icon:"🪴"},
  {title:"마무리 CTA",angle:"정면 / 미디엄샷",duration:"3~4초",script:"부산 수영구 오시면 꼭 들러보세요 위치는 프로필에",tip:"💡 카메라 똑바로 보고 자신있게. 짧고 강하게 끝내세요.",icon:"📍"}
];

let currentScene=0,stream=null,mediaRecorder=null,recordedChunks=[],timerInterval=null,elapsedSeconds=0,isCameraOn=false,isRecording=false,isCountingDown=false,recognition=null,facingMode='environment';
let sceneStatuses=Array(5).fill('none');
const synth=window.speechSynthesis;

function speak(text,onEnd){
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.85; u.pitch=1.1; u.volume=1;
  if(onEnd) u.onend=onEnd;
  synth.speak(u);
}

function showAnim(text,cls,dur,cb){
  const el=document.getElementById('actionAnim');
  el.textContent=text; el.className='action-anim '+(cls||'');
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=>{el.textContent=''; if(cb)cb();},150);
  },dur);
}

function handleRecordBtn(){
  if(!isCameraOn){openCamera();return;}
  if(isCountingDown)return;
  if(isRecording){stopSTT();stopRecording();}
  else{doReadyAction();}
}

function doReadyAction(){
  isCountingDown=true;
  document.getElementById('recordBtn').classList.add('disabled');
  speak('레디',()=>{
    showAnim('READY','',700,()=>{
      setTimeout(()=>{
        speak('액션',()=>{
          showAnim('ACTION!','c-accent',700,()=>{
            isCountingDown=false;
            startRecording();
          });
        });
      },150);
    });
  });
}

function startRecording(){
  recordedChunks=[];
  let mm;
  try{mm=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9,opus'});}
  catch(e){try{mm=new MediaRecorder(stream,{mimeType:'video/webm'});}catch(e2){mm=new MediaRecorder(stream);}}
  mediaRecorder=mm;
  mm.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
  mm.onstop=()=>{
    const blob=new Blob(recordedChunks,{type:'video/webm'});
    showReview(blob);
  };
  mm.start();
  isRecording=true;
  document.getElementById('recordBtn').classList.remove('disabled');
  document.getElementById('recordBtn').classList.add('recording');
  document.getElementById('recIndicator').classList.add('active');
  document.getElementById('timerBadge').style.display='block';
  document.getElementById('teleprompter').classList.add('active');
  document.getElementById('overlayTip').classList.remove('active');
  elapsedSeconds=0;
  timerInterval=setInterval(()=>{
    elapsedSeconds++;
    const m=Math.floor(elapsedSeconds/60),s=elapsedSeconds%60;
    document.getElementById('timerBadge').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  },1000);
  startSTT(SCENES[currentScene].script);
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  clearInterval(timerInterval);
  isRecording=false;
  document.getElementById('recordBtn').classList.remove('recording','disabled');
  document.getElementById('recIndicator').classList.remove('active');
  document.getElementById('timerBadge').style.display='none';
  document.getElementById('teleprompter').classList.remove('active');
  document.getElementById('overlayTip').classList.add('active');
}

function startSTT(scriptText){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='ko-KR'; recognition.continuous=true; recognition.interimResults=true;
  const words=scriptText.replace(/[^가-힣a-zA-Z\s]/g,'').split(/\s+/).filter(Boolean);
  let fired=false;
  recognition.onresult=e=>{
    if(!isRecording||fired)return;
    let transcript='';
    for(let i=e.resultIndex;i<e.results.length;i++) transcript+=e.results[i][0].transcript;
    const spoken=transcript.replace(/[^가-힣a-zA-Z\s]/g,'').split(/\s+/).filter(Boolean);
    let matched=0;
    words.forEach(w=>{if(spoken.some(s=>s.includes(w)||w.includes(s)))matched++;});
    if(words.length>0&&matched>=Math.ceil(words.length*0.55)){
      fired=true;
      setTimeout(()=>{if(isRecording)autoCut();},600);
    }
  };
  try{recognition.start();}catch(e){}
}

function stopSTT(){if(recognition){try{recognition.stop();}catch(e){}recognition=null;}}

function autoCut(){
  stopSTT();
  synth.cancel();
  showAnim('CUT!','c-green',700);
  speak('컷',()=>{stopRecording();});
}

async function openCamera(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    const constraints = facingMode === 'environment'
      ? { video:{ facingMode:'environment', width:{ideal:1080}, height:{ideal:1920} }, audio:true }
      : { video:{ facingMode:'user' }, audio:true };
    stream=await navigator.mediaDevices.getUserMedia(constraints);
    const feed=document.getElementById('cameraFeed');
    feed.srcObject=stream;
    document.getElementById('camPlaceholder').style.display='none';
    isCameraOn=true;
  }catch(e){alert('카메라 접근 권한이 필요해요.');}
}

async function flipCamera(){
  facingMode=facingMode==='environment'?'user':'environment';
  if(isCameraOn)await openCamera();
}

function showReview(blob){
  const url=URL.createObjectURL(blob);
  const video=document.getElementById('reviewVideo');
  video.src=url;
  document.getElementById('reviewSceneTag').textContent=`씬 ${currentScene+1}`;
  document.getElementById('reviewTitle').textContent=SCENES[currentScene].title;
  showScreen('screen-review');
  video.play();
}

function reviewAction(action){
  sceneStatuses[currentScene]=action;
  showScreen('screen-guide');
  if(action==='ng'){resetCamUI();}
  else{nextScene();}
}

function skipScene(){sceneStatuses[currentScene]='none';stopAll();nextScene();}

function nextScene(){
  if(currentScene<4){currentScene++;renderGuide();}
  else{showComplete();}
}

function renderGuide(){
  const s=SCENES[currentScene];
  document.getElementById('sceneNum').textContent=currentScene+1;
  document.getElementById('infoTitle').textContent=`${s.icon} ${s.title}`;
  document.getElementById('infoAngle').textContent=s.angle;
  document.getElementById('infoDuration').textContent=s.duration;
  document.getElementById('teleprompterText').textContent=`"${s.script}"`;
  document.getElementById('tipText').textContent=s.tip;
  document.getElementById('overlayTip').classList.add('active');
  document.getElementById('teleprompter').classList.remove('active');
  const dots=document.getElementById('progressDots');
  dots.innerHTML=SCENES.map((_,i)=>{
    let c='dot';
    if(i<currentScene)c+=' done';
    else if(i===currentScene)c+=' active';
    return `<div class="${c}"></div>`;
  }).join('');
  resetCamUI();
}

function resetCamUI(){
  isRecording=false;isCountingDown=false;
  clearInterval(timerInterval);
  document.getElementById('recordBtn').classList.remove('recording','disabled');
  document.getElementById('recIndicator').classList.remove('active');
  document.getElementById('timerBadge').style.display='none';
  document.getElementById('teleprompter').classList.remove('active');
  const el=document.getElementById('actionAnim');
  el.textContent='';el.className='action-anim';
}

function stopAll(){
  stopSTT();synth.cancel();
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  clearInterval(timerInterval);
  resetCamUI();
}

function showComplete(){
  const sm={ok:'✅',keep:'📌',none:'—',ng:'—'};
  const cm={ok:'s-ok',keep:'s-keep',none:'s-none',ng:'s-none'};
  document.getElementById('sceneResults').innerHTML=SCENES.map((s,i)=>`
    <div class="result-item"><div class="result-status ${cm[sceneStatuses[i]]}">${sm[sceneStatuses[i]]}</div><div>${s.icon} ${s.title}</div></div>
  `).join('');
  showScreen('screen-complete');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGuide(){currentScene=0;showScreen('screen-guide');renderGuide();}

function goIntro(){
  stopAll();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;isCameraOn=false;}
  document.getElementById('camPlaceholder').style.display='flex';
  document.getElementById('cameraFeed').srcObject=null;
  showScreen('screen-intro');
}

function restart(){sceneStatuses=Array(5).fill('none');currentScene=0;showScreen('screen-intro');}

document.getElementById('sceneList').innerHTML=SCENES.map((s,i)=>`
  <div class="scene-item"><div class="scene-num">${i+1}</div><div>${s.icon} ${s.title}</div></div>
`).join('');
</script>
</body>
</html>
